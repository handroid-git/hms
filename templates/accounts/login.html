{% load tailwind_tags %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HMS</title>
    {% tailwind_css %}
</head>
<body class="min-h-screen bg-base-200 flex items-center justify-center px-4">
    <div class="card w-full max-w-md bg-base-100 shadow-xl">
        <div class="card-body">
            <h1 class="text-2xl font-bold text-center">Hospital Login</h1>
            <p class="text-center text-sm text-base-content/70">Sign in to continue</p>

            <form method="post" class="space-y-4 mt-4">
                {% csrf_token %}
                <div>
                    <label class="label"><span class="label-text">Username</span></label>
                    {{ form.username }}
                </div>
                <div>
                    <label class="label"><span class="label-text">Password</span></label>
                    {{ form.password }}
                </div>
                <button type="submit" class="btn btn-primary w-full">Login</button>
            </form>
        </div>
    </div>
</body>
</html>
